name: Daily MLB Predictions
on:
  schedule:
    - cron: '0 3 * * *'    # 06:00 МСК
    - cron: '0 11 * * *'   # 14:00 МСК
    - cron: '0 17 * * *'   # 20:00 МСК
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python mlb_bot.py
